<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTMLSignage — Verbindung wird hergestellt</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      cursor: none;
    }
    .container {
      text-align: center;
      max-width: 500px;
      padding: 2rem;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #c9956b;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 2rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #ffffff;
    }
    p {
      font-size: 0.95rem;
      color: #888;
      line-height: 1.5;
    }
    .countdown {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #666;
    }
    .countdown strong {
      color: #c9956b;
      font-variant-numeric: tabular-nums;
    }
    .retry-btn {
      margin-top: 1.25rem;
      padding: 0.6rem 1.5rem;
      background: #c9956b;
      color: #0a0a0a;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .retry-btn:hover { opacity: 0.85; }
    .retry-btn:active { opacity: 0.7; }
    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ef4444;
      margin-right: 6px;
      vertical-align: middle;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1>Verbindung wird hergestellt</h1>
    <p><span class="status-dot"></span>Der Server ist momentan nicht erreichbar.</p>
    <div class="countdown" id="countdown">Nächster Versuch in <strong id="timer">15</strong>s</div>
    <button class="retry-btn" id="retryBtn" onclick="retryNow()">Jetzt erneut versuchen</button>
  </div>

  <script>
    var seconds = 15;
    var timerEl = document.getElementById('timer');
    var interval = setInterval(function() {
      seconds--;
      if (timerEl) timerEl.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(interval);
        retryNow();
      }
    }, 1000);

    function retryNow() {
      clearInterval(interval);
      // In Electron, the watchdog in main.js will handle reconnection.
      // Triggering a reload of the offline page nudges the watchdog check.
      window.location.reload();
    }
  </script>
</body>
</html>
