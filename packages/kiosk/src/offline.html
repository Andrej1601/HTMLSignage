<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signage Control Center — Verbindung wird hergestellt</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      /* Warmer Wellness-Verlauf statt klinischem Schwarz —
         passt optisch zur Ausspielung und wirkt nicht wie ein
         Systemfehler, falls Gäste den Schirm sekundenkurz sehen. */
      background: linear-gradient(135deg, #1f1812 0%, #2a1f17 50%, #1a1310 100%);
      color: #e8dfd1;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      cursor: none;
    }
    .container {
      text-align: center;
      max-width: 640px;
      padding: 3rem 2rem;
    }
    .glyph {
      width: 84px; height: 84px;
      margin: 0 auto 2.5rem;
      position: relative;
    }
    /* Drei konzentrische Wellen — Wellness-Visualisierung statt
       technischem Spinner. `prefers-reduced-motion` blendet die
       Animation ab; das Glyph bleibt als statischer Ring. */
    .ring {
      position: absolute;
      inset: 0;
      border: 2px solid rgba(201, 149, 107, 0.5);
      border-radius: 50%;
      animation: wave 3s ease-out infinite;
    }
    .ring:nth-child(2) { animation-delay: 1s; }
    .ring:nth-child(3) { animation-delay: 2s; }
    @keyframes wave {
      0%   { transform: scale(0.5); opacity: 1; }
      100% { transform: scale(1.4); opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      .ring { animation: none; opacity: 0.4; }
    }
    h1 {
      font-size: 1.625rem;
      font-weight: 500;
      margin-bottom: 0.75rem;
      color: #f5ede0;
      letter-spacing: -0.01em;
    }
    p {
      font-size: 1.05rem;
      color: #b8a890;
      line-height: 1.55;
    }
    .countdown {
      margin-top: 2rem;
      font-size: 0.95rem;
      color: #8a7a64;
    }
    .countdown strong {
      color: #c9956b;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
    }
    /* Retry-Button bewusst entfernt — auf einem Kiosk-Display mit
       `cursor: none` ist er ohnehin unklickbar und vermittelt nur
       fälschlich, der Gast müsse aktiv werden. Der Watchdog in
       main.js triggert ohnehin im Hintergrund. */
  </style>
</head>
<body>
  <div class="container">
    <div class="glyph" aria-hidden="true">
      <span class="ring"></span>
      <span class="ring"></span>
      <span class="ring"></span>
    </div>
    <h1>Willkommen.</h1>
    <p>Wir sind gleich für Sie da — die Anzeige wird einen Moment vorbereitet.</p>
    <div class="countdown">Nächster Versuch in <strong id="timer">15</strong>s</div>
  </div>

  <script>
    var seconds = 15;
    var timerEl = document.getElementById('timer');
    var interval = setInterval(function() {
      seconds--;
      if (timerEl) timerEl.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(interval);
        // Watchdog in main.js prüft sowieso periodisch — Reload
        // nudgt den Check und nutzt jeden frisch verfügbaren
        // Verbindungsslot.
        window.location.reload();
      }
    }, 1000);
  </script>
</body>
</html>
